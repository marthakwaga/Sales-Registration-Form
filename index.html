<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Registration</title>
    <link rel="stylesheet" type="text/css" href="wk2d2-sales-reg.css">
</head>

<body>
    <div class="container">
        <div class="sidebar">

            <div>
                <a href="dashboard.html">Dashboard</a>
            </div>
            <div><a href="supplieregistration.html">Suppliers</a>
            </div>
        </div>
        <div class="content">
            <form action="" method="get">
                <!-- section 1 -->

                <h1>Sales Registration</h1>
                <section>
                        <div>
                            <label for="SalesDate">Sales Date:</label>
                            <input type="date" name="" id="SalesDate">
                        </div>

                        <div>
                            <label for="SalesPerson">Sales Person:</label>
                            <select name="" id="SalesPerson">
                                <option value="" disabled selected>Select a representative</option>
                                <option value="mw">Martha Wasukira</option>
                                <option value="mk">Martha Kwaga</option>
                                <option value="sw">Steve Wasukira</option>
                                <option value="sm">Steve Medson</option>
                            </select>
                        </div>
                </section>

                <h2>Customer Details</h2>
                <!-- Section 2 -->
                <Section>
                    
                        <div>
                            <label for="Name">Name:</label>
                            <input type="text" placeholder="Enter full name">
                        </div>
                        <div>
                            <label for="Phone Number">Phone Number:</label>
                            <input type="tel" placeholder="+2567xxxxxxxx">
                        </div>
                </section>

                <br>

                <section>
                    <div>
                        <label for="Email">Email:</label>
                        <input type="email" placeholder="youremail@example.com">
                    </div>
                    <div>
                        <label for="Customer Type">Customer Type:</label>
                        <select name="" id="Customer Type">

                            <option value="" disabled selected>Select customer type</option>
                            <option value="1">Retail</option>
                            <option value="2">Wholesale</option>
                            <option value="3">Broker</option>

                        </select>
                    </div>
                </section>
                

                <h2>Items</h2>
                <!-- items -->
                <section>

                        <div>
                            <label for="pdtld">Pdtld:</label>
                            <input type="text" name="pdtld">
                        </div>

                        <div>
                            <label for="quantity">Quantity:</label>
                            <input type="number" id="quantity">
                        </div>
                        
                        <div>
                            <label for="unitprice">Unit Price:</label>
                            <input type="number" name="" id="unitprice">
                        </div>
                        </section>

                        <br>
                        <section>
                        <div>
                            <label for="pdtld">Pdtld:</label>
                            <input type="text" name="pdtld">
                        </div>

                        <div>
                            <label for="quantity">Quantity:</label>
                            <input type="number" id="quantity">
                        </div>
                        
                        <div>
                            <label for="unitprice">Unit Price:</label>
                            <input type="number" name="" id="unitprice">
                        </div>
                        </section>

                        <br>
                        
                            <!-- final bit -->

                            <section id="btn-section">
                                <button type="reset">Cancel</button>
                                <button type="submit">Submit</button>

                            </section>
            </form>

        </div>

    </div>
</body>

</html>
